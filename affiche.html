<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impression Affiche - ClubMatch Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    
    <style>
        /* Configuration stricte pour une impression ou un export PDF au format A4 */
        @page {
            size: A4 portrait;
            margin: 0;
        }
        
        * {
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 0;
            width: 210mm;
            height: 297mm;
            position: relative;
            background-color: #ffffff;
            font-family: -apple-system, system-ui, sans-serif;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        /* L'affiche d'origine sert de fond immuable plein écran */
        .poster-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* Conteneur du QR Code superposé en absolu */
        .qr-overlay-container {
            position: absolute;
            z-index: 2;
            
            /* ================================================================= */
            /* COORDONNÉES À AJUSTER POUR S'ALIGNER AVEC LE CADRE DE VOTRE PNG : */
            top: 48%;         /* Position verticale depuis le haut (en %) */
            left: 50%;          /* Centrage horizontal */
            width: 285px;       /* Largeur du QR Code (à adapter selon le cadre) */
            height: 285px;      /* Hauteur du QR Code */
            /* ================================================================= */
            
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff; /* Fond blanc de sécurité */
            padding: 8px;
            border-radius: 24px; /* Arrondi pour correspondre au design ClubMatch */
        }

        #qrcode {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Interface d'administration éphémère (masquée lors de l'impression) */
        .admin-bar {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 100;
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ffffff;
            padding: 15px 20px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            font-size: 13px;
            backdrop-filter: blur(10px);
            width: 280px;
        }
        
        .btn-print {
            background: linear-gradient(135deg, #ff0055, #ff5e00);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 12px;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
            width: 100%;
        }

        .input-manual {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: white;
            margin-top: 5px;
            font-size: 12px;
        }
        .input-manual:focus {
            outline: none;
            border-color: #ff0055;
        }

        @media print {
            .admin-bar {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="admin-bar">
        <p style="margin: 0 0 5px 0;"><strong>Générateur d'Affiche ClubMatch Pro</strong></p>
        <p style="margin: 0 0 10px 0; color: #a3a3a3;">Slug actif : <span id="eventslug" style="color: #ff0055; font-weight: bold;">--</span></p>
        
        <div style="margin-top: 10px;">
            <label style="color: #a3a3a3; font-size: 11px;">Modifier / Forcer le Slug :</label>
            <input type="text" id="manual-slug-input" class="input-manual" placeholder="Ex: camping-palace-4819">
        </div>

        <button class="btn-print" onclick="window.print()">Imprimer / Enregistrer en PDF</button>
    </div>

    <img src="afficheQRnew.png" class="poster-background" alt="Structure Affiche ClubMatch">

    <div class="qr-overlay-container">
        <canvas id="qrcode"></canvas>
    </div>

    <script>
        // 1. Récupération des éléments du DOM
        const eventField = document.getElementById('eventslug');
        const manualInput = document.getElementById('manual-slug-input');
        let qrInstance = null;

        // 2. Fonction centrale de mise à jour du texte et du QR Code
        function updatePoster(slug) {
            const cleanSlug = slug.trim();
            
            // Évite de générer un QR code sur les accolades brutes de l'outil d'automatisation
            if (cleanSlug.includes('{{') || cleanSlug === '') {
                return; 
            }

            // Mise à jour de votre champ 'eventslug' existant
            if (eventField) {
                if (eventField.tagName === 'INPUT' || eventField.tagName === 'TEXTAREA') {
                    eventField.value = cleanSlug;
                } else {
                    eventField.innerText = cleanSlug;
                }
            }

            // Construction de l'URL cible
            const targetAppUrl = `https://clubmatchpro.fr/app.html?event=${cleanSlug}`;

            // Rendu adaptatif sur votre canvas 'qrcode' existant
            const qrCanvas = document.getElementById('qrcode');
            if (qrCanvas) {
                if (!qrInstance) {
                    qrInstance = new QRious({
                        element: qrCanvas,
                        value: targetAppUrl,
                        size: 400,
                        level: 'H'
                    });
                } else {
                    qrInstance.value = targetAppUrl;
                }
            }
        }

        // 3. Script d'initialisation au chargement de la page
        const urlParams = new URLSearchParams(window.location.search);
        let initialSlug = urlParams.get('event') || '';

        // Si l'URL contient une vraie valeur (pas de {{...}}), on l'applique et on remplit le champ de saisie
        if (initialSlug && !initialSlug.includes('{{')) {
            manualInput.value = initialSlug;
            updatePoster(initialSlug);
        } else {
            // Valeur visuelle temporaire en attendant la saisie de l'utilisateur
            updatePoster('session-demo');
        }

        // 4. Écouteur d'événement : génère le QR Code en temps réel à chaque touche tapée
        manualInput.addEventListener('input', (e) => {
            updatePoster(e.target.value);
        });
    </script>
</body>
</html>
