<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impression Affiche - ClubMatch Pro</title>
    
    <style>
        @page {
            size: A4 portrait;
            margin: 0;
        }
        
        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            padding: 0;
            width: 210mm;
            height: 297mm;
            position: relative;
            background-color: #ffffff;
            font-family: -apple-system, system-ui, sans-serif;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        /* L'affiche d'origine sert de fond */
        .poster-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* Conteneur du QR Code superposé */
        .qr-overlay-container {
            position: absolute;
            z-index: 2;
            top: 39.5%;         /* À ajuster si besoin */
            left: 50%;
            width: 200px;       /* À ajuster si besoin */
            height: 200px;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            padding: 8px;
            border-radius: 24px;
        }

        /* La balise image qui va recevoir le QR Code de Firebase */
        #qr-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        /* Affichage du slug de l'événement sur l'affiche */
        .event-slug-display {
            position: absolute;
            z-index: 2;
            top: 48%; /* Positionné juste sous le QR Code */
            left: 50%;
            transform: translateX(-50%);
            font-size: 14pt;
            font-weight: 800;
            color: #1a1a1a;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: rgba(255, 255, 255, 0.9);
            padding: 4px 12px;
            border-radius: 8px;
        }

        /* Interface d'administration éphémère */
        .admin-bar {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 100;
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ffffff;
            padding: 15px 20px;
            border-radius: 16px;
            font-size: 13px;
        }
        
        .btn-print {
            background: linear-gradient(135deg, #ff0055, #ff5e00);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            text-transform: uppercase;
            font-size: 11px;
        }

        @media print {
            .admin-bar { display: none; }
        }
    </style>
</head>
<body>

    <div class="admin-bar">
        <p style="margin: 0 0 5px 0;"><strong>Générateur d'Affiche ClubMatch</strong></p>
        <button class="btn-print" onclick="window.print()">Imprimer l'affiche</button>
    </div>

    <!-- Image de fond -->
    <img src="afficheQRnew.png" class="poster-background" alt="Fond Affiche">

    <!-- QR Code injecté ici -->
    <div class="qr-overlay-container">
        <img id="qr-image" src="" alt="QR Code de l'événement">
    </div>

    <!-- Nom de l'événement affiché sous le QR Code -->
    <div id="event-name" class="event-slug-display"></div>

    <script>
        // Masquer la barre admin si chargé dans JetAdmin (Iframe)
        if (window.self !== window.top) {
            document.querySelector('.admin-bar').style.display = 'none';
        }

        // Récupération des paramètres envoyés par JetAdmin
        const urlParams = new URLSearchParams(window.location.search);
        const eventSlug = urlParams.get('event') || 'Événement inconnu';
        const qrCodeUrl = urlParams.get('qr');
        
        // 1. Afficher le nom de l'événement sur l'affiche
        document.getElementById('event-name').innerText = eventSlug;

        // 2. Assigner l'image du QR Code
        if (qrCodeUrl) {
            // On décode l'URL au cas où JetAdmin l'ait encodée
            document.getElementById('qr-image').src = decodeURIComponent(qrCodeUrl);
        } else {
            console.error("Aucun QR Code fourni dans l'URL");
        }
    </script>
</body>
</html>
