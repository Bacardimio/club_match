<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Match Pro - SaaS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent: #ff0055; }
        body { background: #0a0a0a; color: white; font-family: -apple-system, system-ui, sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .btn-main { background: linear-gradient(135deg, var(--accent), #ff5e00); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255, 0, 85, 0.3); }
    </style>
</head>
<body class="bg-[#0a0a0a] text-white antialiased">
    <header class="w-full max-w-7xl mx-auto px-6 py-6 flex justify-between items-center relative z-50">
        <span class="text-2xl font-black tracking-tighter italic uppercase">CLUB<span class="text-pink-600">MATCH</span> <span class="text-xs not-italic font-bold bg-white/10 px-2 py-0.5 rounded text-gray-400">PRO</span></span>
        <a href="#pricing" class="btn-main px-5 py-2.5 rounded-xl font-bold text-sm tracking-wide">Acheter</a>
    </header>

    <section class="relative max-w-7xl mx-auto px-6 pt-16 pb-24 text-center space-y-8">
        <h1 class="text-5xl md:text-7xl font-black tracking-tight uppercase italic max-w-4xl mx-auto leading-tight">
            Le Networking <span class="text-pink-600">réinventé</span>
        </h1>
        <p class="text-gray-400 text-lg max-w-2xl mx-auto">Pas de téléchargement. Un numéro de badge. Un Match.</p>
        <div class="flex flex-col sm:flex-row justify-center items-center gap-4 pt-4">
            <a href="/app.html?event=default" class="w-full sm:w-auto glass hover:bg-white/5 transition-colors px-8 py-4 rounded-2xl font-bold text-lg text-center">
                Tester la Démo
            </a>
            <a href="#pricing" class="w-full sm:w-auto btn-main px-8 py-4 rounded-2xl font-black text-lg uppercase tracking-wider text-center">
                Lancer un Événement
            </a>
        </div>
    </section>

    <section id="pricing" class="max-w-4xl mx-auto px-6 py-24">
        <div class="grid md:grid-cols-2 gap-8">
            <div class="glass p-8 rounded-[2.5rem] space-y-6 border-white/10">
                <h3 class="text-2xl font-black uppercase italic">Single</h3>
                <p class="text-5xl font-black">49€<span class="text-gray-500 text-sm">/soir</span></p>
                <button onclick="window.location.href='/app.html?event=demo'" class="w-full bg-white/10 py-4 rounded-xl font-bold uppercase text-sm">Commander</button>
            </div>
            <div class="glass p-8 rounded-[2.5rem] space-y-6 border-pink-500/20 bg-pink-500/5">
                <h3 class="text-2xl font-black uppercase italic text-pink-500">Agence</h3>
                <p class="text-5xl font-black">199€<span class="text-gray-500 text-sm">/an</span></p>
                <button onclick="window.location.href='/app.html?event=pro'" class="w-full btn-main py-4 rounded-xl font-black uppercase text-sm">Passer Pro</button>
            </div>
        </div>
    </section>

    <footer class="w-full text-center py-12 text-xs text-gray-500 border-t border-white/5">
        <p>© 2026 Club Match Pro. Tous droits réservés. Hébergé sur Vercel.</p>
    </footer>
</body>
</html>
