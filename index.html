<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, get, remove } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    // --- CONFIGURATION ---
    const ADMIN_PIN = "2026"; // <--- MODIFIE TON CODE ICI
    const firebaseConfig = {
        apiKey: "AIzaSyDP3JFut79NexJwawiDYEgJO0_r-HWYQVc",
        authDomain: "club-match-d2d39.firebaseapp.com",
        databaseURL: "https://club-match-d2d39-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "club-match-d2d39",
        storageBucket: "club-match-d2d39.firebasestorage.app",
        messagingSenderId: "975364560340",
        appId: "1:975364560340:web:64fd827ced5c24b808f241"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let currentBadge = localStorage.getItem('myBadge');

    // --- LOGIQUE UTILISATEUR ---
    window.initUser = () => {
        const badge = document.getElementById('user-badge').value.trim();
        if(!badge) return alert("Entrez un numéro !");
        currentBadge = badge;
        localStorage.setItem('myBadge', badge);
        showApp();
    };

    window.submitLike = async () => {
        const target = document.getElementById('target-badge').value.trim();
        const btn = document.getElementById('btn-flash');
        if(!target || target === currentBadge) return;

        btn.disabled = true;
        btn.innerText = "ENVOI...";

        try {
            await set(ref(db, `likes/${currentBadge}/${target}`), true);
            const checkMatch = await get(ref(db, `likes/${target}/${currentBadge}`));
            
            if(checkMatch.exists()) {
                alert("C'EST UN MATCH ! 🔥");
            } else {
                alert("Flash envoyé !");
            }
            document.getElementById('target-badge').value = "";
        } catch (e) { alert("Erreur de connexion"); } 
        finally {
            btn.disabled = false;
            btn.innerText = "FLASHER";
        }
    };

    // --- LOGIQUE ADMIN AVEC CODE ---
    window.toggleAdmin = () => {
        const panel = document.getElementById('admin-panel');
        if (!panel.classList.contains('hidden')) {
            panel.classList.add('hidden');
        } else {
            const pass = prompt("Code secret admin :");
            if (pass === ADMIN_PIN) {
                panel.classList.remove('hidden');
            } else if (pass != null) {
                alert("Accès refusé.");
            }
        }
    };

    window.resetEvent = async () => {
        if(confirm("⚠️ ACTION IRRÉVERSIBLE : Supprimer tous les likes et matches ?")) {
            await remove(ref(db, 'likes/'));
            alert("Base de données réinitialisée.");
            location.reload();
        }
    };

    // --- MISE À JOUR TEMPS RÉEL ---
    function showApp() {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        document.getElementById('display-badge').innerText = currentBadge;
        
        onValue(ref(db, `likes`), (snapshot) => {
            const allLikes = snapshot.val() || {};
            let countReceived = 0;
            let matches = [];

            for (let fromUser in allLikes) {
                if (allLikes[fromUser][currentBadge]) {
                    countReceived++;
                    if (allLikes[currentBadge] && allLikes[currentBadge][fromUser]) {
                        matches.push(fromUser);
                    }
                }
            }
            updateUI(countReceived, matches);
        });
    }

    function updateUI(likesCount, matchesArray) {
        document.getElementById('stat-likes').innerText = likesCount;
        document.getElementById('stat-matches').innerText = matchesArray.length;
        const list = document.getElementById('match-list');
        list.innerHTML = matchesArray.length === 0 ? '<p class="text-gray-600 text-center py-4 italic text-sm">Aucun match...</p>' : '';
        matchesArray.forEach(m => {
            const div = document.createElement('div');
            div.className = "glass p-4 rounded-2xl flex justify-between items-center animate-pop";
            div.innerHTML = `<span class="font-bold text-lg">Badge #${m}</span><span class="text-pink-500 font-bold">MATCH 🔥</span>`;
            list.appendChild(div);
        });
    }

    if(currentBadge) showApp();
</script>
