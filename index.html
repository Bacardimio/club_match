<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Club Match Pro - L'App Officielle de la Soirée</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --accent: #ff0055; }
        body { background: #0a0a0a; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-main { background: linear-gradient(135deg, var(--accent), #ff5e00); box-shadow: 0 4px 15px rgba(255, 0, 85, 0.3); }
        .animate-pop { animation: pop 0.3s ease-out; }
        @keyframes pop { 0% { transform: scale(0.9); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="flex flex-col min-h-screen items-center p-4">

    <div id="login-screen" class="w-full max-w-sm my-auto space-y-8 animate-pop">
        <div class="text-center">
            <h1 class="text-5xl font-black tracking-tighter text-white">CLUB<br><span class="text-pink-600">MATCH</span></h1>
            <p class="text-gray-500 mt-2 italic">Scannez. Flashez. Matchez.</p>
        </div>
        <div class="glass p-8 rounded-[2rem] space-y-4">
            <input type="number" id="user-badge" placeholder="Votre numéro de badge" 
                class="w-full bg-white/10 border-none rounded-2xl p-5 text-center text-2xl focus:ring-2 focus:ring-pink-500 outline-none transition-all">
            <button onclick="initUser()" class="w-full btn-main py-5 rounded-2xl font-bold text-xl uppercase tracking-widest">Entrer dans le jeu</button>
        </div>
    </div>

    <div id="main-app" class="hidden w-full max-w-md space-y-6">
        <header class="flex justify-between items-center py-4">
            <span class="text-xl font-bold">Badge <span id="display-badge" class="text-pink-500">--</span></span>
            <button onclick="toggleAdmin()" class="opacity-20 text-xs">Admin</button>
        </header>

        <div class="grid grid-cols-2 gap-4">
            <div class="glass p-6 rounded-3xl text-center">
                <span class="block text-4xl font-black" id="stat-popular">0</span>
                <span class="text-[10px] uppercase tracking-widest text-gray-400">Likes reçus</span>
            </div>
            <div class="glass p-6 rounded-3xl text-center border-pink-500/30">
                <span class="block text-4xl font-black text-pink-500" id="stat-matches">0</span>
                <span class="text-[10px] uppercase tracking-widest text-gray-400">Matches 🔥</span>
            </div>
        </div>

        <div class="glass p-8 rounded-[2.5rem] space-y-4 shadow-2xl">
            <h3 class="text-center text-sm font-medium text-gray-400">QUI AVEZ-VOUS REMARQUÉ ?</h3>
            <input type="number" id="target-badge" placeholder="N°" 
                class="w-full bg-black/40 border border-white/10 rounded-2xl p-6 text-center text-4xl font-bold focus:border-pink-500 outline-none">
            <button onclick="submitLike()" class="w-full btn-main py-6 rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-transform">
                FLASHER
            </button>
        </div>

        <div id="match-list" class="space-y-2"></div>
    </div>

    <div id="admin-panel" class="hidden fixed inset-0 bg-black/95 z-50 p-10 flex flex-col items-center justify-center text-center">
        <h2 class="text-2xl font-bold mb-8 text-red-500">ADMINISTRATION</h2>
        <button onclick="resetEvent()" class="bg-red-600 px-8 py-4 rounded-xl font-bold mb-4">RÉINITIALISER LA SOIRÉE</button>
        <p class="text-xs text-gray-500">Efface tous les likes et les matches de la base de données</p>
        <button onclick="toggleAdmin()" class="mt-10 underline">Fermer</button>
    </div>

    <script>
        // Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDP3JFut79NexJwawiDYEgJO0_r-HWYQVc",
  authDomain: "club-match-d2d39.firebaseapp.com",
  databaseURL: "https://club-match-d2d39-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "club-match-d2d39",
  storageBucket: "club-match-d2d39.firebasestorage.app",
  messagingSenderId: "975364560340",
  appId: "1:975364560340:web:64fd827ced5c24b808f241",
  measurementId: "G-HGMDSDMVEB"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
        }

        let currentBadge = localStorage.getItem('myBadge');

        function initUser() {
            const badge = document.getElementById('user-badge').value;
            if(!badge) return;
            currentBadge = badge;
            localStorage.setItem('myBadge', badge);
            showApp();
        }

        function showApp() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('display-badge').innerText = "#" + currentBadge;
            loadData();
        }

        function submitLike() {
            const target = document.getElementById('target-badge').value;
            if(!target || target === currentBadge) return;
            
            // Logique de Like (Push vers Firebase)
            console.log(`Like envoyé de ${currentBadge} vers ${target}`);
            alert("C'est envoyé !");
            document.getElementById('target-badge').value = "";
        }

        function toggleAdmin() {
            document.getElementById('admin-panel').classList.toggle('hidden');
        }

        function resetEvent() {
            if(confirm("Êtes-vous sûr de vouloir tout effacer ?")) {
                localStorage.clear();
                location.reload();
            }
        }

        if(currentBadge) showApp();
    </script>
</body>
</html>
