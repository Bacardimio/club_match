<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Match Pro - Networking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .btn-main { background: linear-gradient(135deg, #ff0055, #ff5e00); }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <header class="p-6 flex justify-between items-center max-w-7xl mx-auto w-full">
        <span class="text-2xl font-black italic">CLUB<span class="text-pink-600">MATCH</span> PRO</span>
        <a href="#pricing" class="btn-main px-6 py-2 rounded-xl font-bold text-sm">Acheter</a>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center text-center px-6 space-y-8">
        <h1 class="text-6xl md:text-8xl font-black uppercase italic leading-tight">Le Networking <br><span class="text-pink-600">réinventé</span></h1>
        <p class="text-gray-400 text-xl max-w-xl">Pas d'application à télécharger. Un simple numéro de badge et les rencontres commencent.</p>
        <div class="flex gap-4">
            <a href="/app.html?event=default" class="glass px-8 py-4 rounded-2xl font-bold hover:bg-white/5">Démo Live</a>
            <a href="#pricing" class="btn-main px-8 py-4 rounded-2xl font-black uppercase">Lancer mon event</a>
        </div>
    </main>

    <section id="pricing" class="max-w-4xl mx-auto w-full p-6 pb-20">
        <div class="grid md:grid-cols-2 gap-6">
            <div class="glass p-10 rounded-[3rem] text-center space-y-4">
                <h3 class="text-2xl font-bold">SINGLE EVENT</h3>
                <p class="text-4xl font-black">49€</p>
                <button class="w-full py-4 bg-white/10 rounded-xl font-bold uppercase">Commander</button>
            </div>
            <div class="glass p-10 rounded-[3rem] text-center space-y-4 border-pink-500/30">
                <h3 class="text-2xl font-bold text-pink-500">AGENCY PRO</h3>
                <p class="text-4xl font-black">199€<span class="text-sm text-gray-500">/an</span></p>
                <button class="w-full btn-main py-4 rounded-xl font-black uppercase">S'abonner</button>
            </div>
        </div>
    </section>
</body>
</html>
