<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Club Match Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent: #ff0055; }
        body { background: #0a0a0a; color: white; font-family: -apple-system, system-ui, sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-main { background: linear-gradient(135deg, var(--accent), #ff5e00); transition: all 0.2s; }
        .btn-main:active { transform: scale(0.95); opacity: 0.9; }
        .match-card { animation: slideIn 0.4s ease-out; border-left: 4px solid #ff0055; }
        @keyframes slideIn { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body class="flex flex-col min-h-screen items-center p-4">

    <!-- Écran Connexion -->
    <div id="login-screen" class="w-full max-w-sm my-auto space-y-8">
        <div class="text-center">
            <h1 class="text-6xl font-black tracking-tighter italic">CLUB<br><span class="text-pink-600">MATCH</span></h1>
            <p class="text-gray-500 mt-2">Entrez votre numéro pour commencer</p>
        </div>
        <div class="glass p-8 rounded-[2rem] space-y-4">
            <input type="number" id="user-badge" placeholder="N° de Badge" 
                   class="w-full bg-white/10 border-none rounded-2xl p-5 text-center text-3xl focus:ring-2 focus:ring-pink-500 outline-none">
            <button onclick="initUser()" class="w-full btn-main py-5 rounded-2xl font-bold text-xl uppercase tracking-widest">Rejoindre</button>
        </div>
    </div>

    <!-- App Principale -->
    <div id="main-app" class="hidden w-full max-w-md space-y-6">
        <header class="flex justify-between items-center py-4">
            <div class="flex flex-col">
                <span class="text-gray-400 text-xs uppercase">Mon Profil</span>
                <span class="text-2xl font-black text-pink-500">#<span id="display-badge">--</span></span>
            </div>
            <button onclick="toggleAdmin()" class="opacity-20 hover:opacity-100 transition-opacity">⚙️</button>
        </header>

        <!-- Stats -->
        <div class="grid grid-cols-2 gap-4">
            <div class="glass p-6 rounded-3xl text-center">
                <span class="block text-4xl font-black" id="stat-likes">0</span>
                <span class="text-[10px] uppercase tracking-widest text-gray-400">Likes reçus</span>
            </div>
            <div class="glass p-6 rounded-3xl text-center border-pink-500/30">
                <span class="block text-4xl font-black text-pink-500" id="stat-matches">0</span>
                <span class="text-[10px] uppercase tracking-widest text-gray-400">Matches 🔥</span>
            </div>
        </div>

        <!-- Action -->
        <div class="glass p-8 rounded-[2.5rem] space-y-4 shadow-2xl">
            <h3 class="text-center text-sm font-medium text-gray-400 uppercase tracking-widest">Flasher un profil</h3>
            <input type="number" id="target-badge" placeholder="N°" 
                   class="w-full bg-black/40 border border-white/10 rounded-2xl p-6 text-center text-5xl font-bold focus:border-pink-500 outline-none transition-all">
            <button id="btn-flash" onclick="submitLike()" class="w-full btn-main py-6 rounded-2xl font-black text-xl">
                FLASHER
            </button>
        </div>

        <!-- Liste des Matches -->
        <div id="match-container" class="space-y-3">
            <h4 class="text-xs font-bold text-gray-500 uppercase px-2">Vos connexions</h4>
            <div id="match-list" class="space-y-2">
                <!-- Les matches apparaîtront ici -->
            </div>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="admin-panel" class="hidden fixed inset-0 bg-black/98 z-50 p-10 flex flex-col items-center justify-center">
        <h2 class="text-2xl font-bold mb-8 text-red-500">ADMINISTRATION</h2>
        <button onclick="resetEvent()" class="bg-red-600 w-full max-w-xs py-4 rounded-xl font-bold mb-4">RESET DATABASE</button>
        <button onclick="toggleAdmin()" class="underline text-gray-400">Retour</button>
    </div>

    <script type="module">
        // Importation SDK Modulaire (plus rapide)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, get, remove } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDP3JFut79NexJwawiDYEgJO0_r-HWYQVc",
            authDomain: "club-match-d2d39.firebaseapp.com",
            databaseURL: "https://club-match-d2d39-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "club-match-d2d39",
            storageBucket: "club-match-d2d39.firebasestorage.app",
            messagingSenderId: "975364560340",
            appId: "1:975364560340:web:64fd827ced5c24b808f241"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentBadge = localStorage.getItem('myBadge');

        // --- Fonctions Globales (attachées à window pour les onclick du HTML) ---
        
        window.initUser = () => {
            const badge = document.getElementById('user-badge').value.trim();
            if(!badge) return alert("Entrez un numéro !");
            currentBadge = badge;
            localStorage.setItem('myBadge', badge);
            showApp();
        };

        window.submitLike = async () => {
            const target = document.getElementById('target-badge').value.trim();
            const btn = document.getElementById('btn-flash');

            if(!target || target === currentBadge) return;

            btn.disabled = true;
            btn.innerText = "ENVOI...";

            try {
                // 1. Enregistrer mon like
                await set(ref(db, `likes/${currentBadge}/${target}`), true);
                
                // 2. Vérifier si c'est un match (si la cible m'a déjà liké)
                const checkMatch = await get(ref(db, `likes/${target}/${currentBadge}`));
                
                if(checkMatch.exists()) {
                    alert("C'EST UN MATCH ! 🔥");
                } else {
                    alert("Flash envoyé !");
                }
                
                document.getElementById('target-badge').value = "";
            } catch (e) {
                console.error(e);
            } finally {
                btn.disabled = false;
                btn.innerText = "FLASHER";
            }
        };

        window.toggleAdmin = () => {
            document.getElementById('admin-panel').classList.toggle('hidden');
        };

        window.resetEvent = async () => {
            if(confirm("Voulez-vous supprimer TOUTES les données de la soirée ?")) {
                await remove(ref(db, 'likes/'));
                localStorage.clear();
                location.reload();
            }
        };

        function showApp() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('display-badge').innerText = currentBadge;
            startListeners();
        }

        // --- Ecouteurs de données en temps réel ---
        function startListeners() {
            // Ecouter les likes reçus (Popularité)
            // Note: Dans une structure simple, on compte combien de personnes ont un noeud vers nous
            onValue(ref(db, `likes`), (snapshot) => {
                const allLikes = snapshot.val() || {};
                let countReceived = 0;
                let matches = [];

                for (let fromUser in allLikes) {
                    // Si quelqu'un m'a liké
                    if (allLikes[fromUser][currentBadge]) {
                        countReceived++;
                        // Si je l'ai aussi liké (Match)
                        if (allLikes[currentBadge] && allLikes[currentBadge][fromUser]) {
                            matches.push(fromUser);
                        }
                    }
                }

                updateUI(countReceived, matches);
            });
        }

        function updateUI(likesCount, matchesArray) {
            document.getElementById('stat-likes').innerText = likesCount;
            document.getElementById('stat-matches').innerText = matchesArray.length;
            
            const list = document.getElementById('match-list');
            list.innerHTML = matchesArray.length === 0 
                ? '<p class="text-gray-600 text-center py-4 italic text-sm">Aucun match pour le moment...</p>'
                : '';

            matchesArray.forEach(matchBadge => {
                const div = document.createElement('div');
                div.className = "glass p-4 rounded-2xl flex justify-between items-center match-card";
                div.innerHTML = `
                    <span class="font-bold text-lg">Badge #${matchBadge}</span>
                    <span class="text-pink-500 text-sm font-bold">MATCH 🔥</span>
                `;
                list.appendChild(div);
            });
        }

        // Auto-login
        if(currentBadge) showApp();
    </script>
</body>
</html>
