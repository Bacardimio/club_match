<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Match Pro - Dashboard Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .table-header { padding: 1rem; white-space: nowrap; }
        
        .qr-container { position: relative; display: inline-block; }
        .qr-preview { 
            position: absolute; 
            bottom: 100%; 
            left: 50%; 
            transform: translateX(-50%); 
            display: none; 
            z-index: 50; 
            background: white; 
            padding: 12px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 180px;
        }
        .qr-container:hover .qr-preview { display: block; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-[1600px] mx-auto space-y-8">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-3xl font-black italic uppercase">Back<span class="text-pink-500">Office</span></h1>
                <p class="text-gray-500 text-sm">Gestion Logistique & Commandes</p>
            </div>
            <div class="flex items-center gap-4 w-full md:w-auto justify-between md:justify-end">
                <button id="btn-export" class="bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-black px-4 py-2.5 rounded-xl uppercase transition-all flex items-center gap-2 shadow-lg shadow-emerald-950/40">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                    Exporter Excel
                </button>
                <div class="font-mono text-pink-500 text-sm whitespace-nowrap" id="clock"></div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <div class="glass p-6 rounded-3xl">
                <p class="text-gray-500 text-xs font-bold uppercase tracking-widest">Total CA</p>
                <p id="stat-ca" class="text-4xl font-black mt-2">0€</p>
            </div>
            <div class="glass p-6 rounded-3xl border-pink-500/20">
                <p class="text-gray-500 text-xs font-bold uppercase tracking-widest">Commandes</p>
                <p id="stat-orders" class="text-4xl font-black mt-2 text-pink-500">0</p>
            </div>
            <div class="glass p-6 rounded-3xl border-blue-500/20">
                <p class="text-gray-500 text-xs font-bold uppercase tracking-widest text-blue-400">Total Packs Physiques</p>
                <p id="stat-packs" class="text-4xl font-black mt-2 text-blue-400">0</p>
            </div>
            <div class="glass p-6 rounded-3xl flex items-center justify-center text-center">
                <p class="text-emerald-400 text-[10px] font-mono animate-pulse">Interface & Code Nettoyés</p>
            </div>
        </div>

        <div class="glass rounded-[2rem] overflow-hidden overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead class="bg-white/5 text-gray-400 text-[10px] uppercase font-bold tracking-widest">
                    <tr>
                        <th class="table-header">Date Reçue</th>
                        <th class="table-header">Événement / Slug</th>
                        <th class="table-header">Contact Client</th>
                        <th class="table-header">Formule / Plan</th>
                        <th class="table-header">Période Événement</th>
                        <th class="table-header">Logistique (Packs & Addresse)</th>
                        <th class="table-header text-center">Traité</th>
                        <th class="table-header text-right">Montant</th>
                        <th class="table-header text-center">QR Code</th>
                        <th class="table-header text-center">Actions</th>
                    </tr>
                </thead>
                <tbody id="orders-list" class="divide-y divide-white/5"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, onValue, remove, update } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDP3JFut79NexJwawiDYEgJO0_r-HWYQVc",
            authDomain: "club-match-d2d39.firebaseapp.com",
            databaseURL: "https://club-match-d2d39-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "club-match-d2d39",
            storageBucket: "club-match-d2d39.firebasestorage.app",
            messagingSenderId: "975364560340",
            appId: "1:975364560340:web:64fd827ced5c24b808f241"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let globalOrdersData = null;

        const pass = prompt("Accès Admin :");
        if (pass !== "2026") document.body.innerHTML = "";

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleString(); }, 1000);

        const formatEventDate = (dateVal) => {
            if (!dateVal) return '--';
            if (typeof dateVal === 'object') {
                if (dateVal.seconds) dateVal = dateVal.seconds * 1000;
                else if (dateVal.time) dateVal = dateVal.time;
            }
            let num = Number(dateVal);
            if (!isNaN(num) && String(dateVal).trim() !== '') {
                if (num > 0 && num < 9999999999) num = num * 1000;
                const d = new Date(num);
                if (!isNaN(d.getTime())) return d.toLocaleDateString('fr-FR');
            }
            const d = new Date(dateVal);
            return isNaN(d.getTime()) ? dateVal : d.toLocaleDateString('fr-FR');
        };

        async function downloadQR(url, filename) {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = filename + ".jpg";
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (e) { alert("Erreur QR."); }
        }

        async function deleteOrderAndEvent(orderId, eventSlug, eventName) {
            if (confirm(`Supprimer la commande "${eventName}" ?`)) {
                try {
                    await remove(ref(db, `orders/${orderId}`));
                    if (eventSlug) await remove(ref(db, `events/${eventSlug}`));
                } catch (e) { alert("Erreur suppression."); }
            }
        }

        // EXPORT EXCEL
        document.getElementById('btn-export').onclick = () => {
            if (!globalOrdersData) return alert("Aucune donnée.");
            let csvContent = "\ufeff"; 
            csvContent += "ID Commande;Date Achat;Nom Événement;Slug;E-mail;Téléphone;Formule / Plan;Date Début;Date Fin;Packs Physiques;Addresse Livraison;Montant (€);Statut Traité\n";

            Object.entries(globalOrdersData).reverse().forEach(([key, order]) => {
                const formula = order.plan || order.formula || order.formule || '48h';
                const start = formatEventDate(order.eventStartDate || order.startDate || order.eventStart || order.dateDebut || order.dateStart);
                const end = formatEventDate(order.eventEndDate || order.endDate || order.eventEnd || order.dateFin || order.dateEnd || order.expiryDate);
                let packCount = parseInt(order.physicalPacksOrdered, 10) || 0;
                const address = (order.postalAddress || order.shippingAddress || 'Licence seule').replace(/;/g, ',').replace(/\n/g, ' ');

                csvContent += `${key};${order.createdAt ? new Date(order.createdAt).toLocaleDateString() : ''};${(order.eventName || '').replace(/;/g, ',')};${(order.eventSlug || '').replace(/;/g, ',')};${(order.email || '').replace(/;/g, ',')};${(order.phone || '').replace(/;/g, ',')};${formula};${start};${end};${packCount};${address};${parseFloat(order.totalAmount) || 0};${order.processed ? "TRAITÉ" : "À TRAITER"}\n`;
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `export_admin_clubmatch_${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        // EN TEMPS RÉEL
        onValue(ref(db, 'orders'), (snapshot) => {
            const list = document.getElementById('orders-list');
            list.innerHTML = "";
            let totalCA = 0;
            let totalPacksGlobal = 0;
            const data = snapshot.val();
            
            globalOrdersData = data;
            if (!data) {
                document.getElementById('stat-ca').innerText = "0€";
                document.getElementById('stat-orders').innerText = "0";
                document.getElementById('stat-packs').innerText = "0";
                return;
            }

            console.clear();
            console.log("%c--- LOGS DEBOGAGE DATES (F12) ---", "color: #ec4899; font-weight: bold;");

            const orders = Object.entries(data).reverse();
            document.getElementById('stat-orders').innerText = orders.length;

            orders.forEach(([key, order]) => {
                let packCount = parseInt(order.physicalPacksOrdered, 10) || 0;
                totalPacksGlobal += packCount;
                totalCA += parseFloat(order.totalAmount) || 0;

                const formulaText = order.plan || order.formula || order.formule || '48h'; 
                const isProcessed = order.processed === true;

                // Récupération des dates
                const startDateDisp = formatEventDate(order.eventStartDate || order.startDate || order.eventStart || order.dateDebut || order.dateStart);
                const endDateDisp = formatEventDate(order.eventEndDate || order.endDate || order.eventEnd || order.dateFin || order.dateEnd || order.expiryDate);

                console.log(`[${order.eventName || 'Sans nom'}] Du : ${startDateDisp} | Au : ${endDateDisp}`);

                const appLink = `${window.location.origin}/app.html?event=${order.eventSlug}`;
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=500x500&format=jpg&data=${encodeURIComponent(appLink)}`;

                const tr = document.createElement('tr');
                tr.className = `transition-colors ${isProcessed ? 'bg-white/[0.01] opacity-60 hover:bg-white/5' : 'hover:bg-white/5'}`;
                
                tr.innerHTML = `
                    <td class="p-4 text-[10px] text-gray-500 font-mono whitespace-nowrap">${order.createdAt ? new Date(order.createdAt).toLocaleDateString() : '--'}</td>
                    
                    <td class="p-4">
                        <div class="font-bold text-xs text-white uppercase">${order.eventName || '--'}</div>
                        <div class="text-[9px] text-pink-500 font-mono uppercase tracking-wider mt-0.5">${order.eventSlug || '--'}</div>
                    </td>
                    
                    <td class="p-4">
                        <div class="text-xs text-gray-300 break-all">${order.email || '--'}</div>
                        <div class="text-xs text-blue-400 font-mono mt-0.5">${order.phone || '--'}</div>
                    </td>
                    
                    <td class="p-4">
                        <span class="inline-block bg-pink-500/10 text-pink-400 border border-pink-500/20 text-[10px] font-black px-2.5 py-1 rounded uppercase">
                            ${formulaText}
                        </span>
                    </td>
                    
                    <td class="p-4 text-xs font-mono text-gray-300 whitespace-nowrap">
                        <div class="flex flex-col gap-0.5">
                            <div><span class="text-gray-500 text-[10px] uppercase mr-1">Début:</span>${startDateDisp}</div>
                            <div><span class="text-gray-500 text-[10px] uppercase mr-1">Fin:</span>${endDateDisp}</div>
                        </div>
                    </td>
                    
                    <td class="p-4">
                        <div class="flex items-start gap-3">
                            <span class="${packCount > 0 ? 'bg-blue-600 text-white shadow-lg shadow-blue-900/20' : 'text-gray-600 bg-white/5'} font-black px-2.5 py-0.5 rounded text-xs inline-block min-w-[32px] text-center mt-0.5">
                                ${packCount}
                            </span>
                            <span class="text-[10px] text-gray-400 italic max-w-[220px] block break-words">${order.postalAddress || order.shippingAddress || 'Licence numérique seule'}</span>
                        </div>
                    </td>

                    <td class="p-4 text-center">
                        <input type="checkbox" id="check-${key}" ${isProcessed ? 'checked' : ''} 
                            class="w-4 h-4 rounded border-white/10 text-pink-500 bg-white/5 cursor-pointer accent-pink-500 focus:ring-0 focus:ring-offset-0">
                    </td>
                    
                    <td class="p-4 text-right font-black text-white">${parseFloat(order.totalAmount) || 0}€</td>
                    <td class="p-4 text-center">
                        <div class="qr-container">
                            <button id="dl-${key}" class="bg-white/10 text-white text-[10px] font-black px-3 py-1.5 rounded uppercase hover:bg-pink-500 transition-all">QR</button>
                            <div class="qr-preview"><img src="${qrUrl}" alt="QR" width="150" height="150" class="mx-auto"></div>
                        </div>
                    </td>
                    <td class="p-4 text-center">
                        <button id="del-${key}" class="text-gray-600 hover:text-red-500 transition-colors p-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                    </td>
                `;
                list.appendChild(tr);
                
                document.getElementById(`check-${key}`).onchange = async (e) => {
                    try {
                        await update(ref(db, `orders/${key}`), { processed: e.target.checked });
                    } catch (err) { alert("Erreur statut."); }
                };

                document.getElementById(`dl-${key}`).onclick = () => downloadQR(qrUrl, `QR_${order.eventSlug || key}`);
                document.getElementById(`del-${key}`).onclick = () => deleteOrderAndEvent(key, order.eventSlug, order.eventName || 'Sans nom');
            });
            
            document.getElementById('stat-ca').innerText = totalCA + "€";
            document.getElementById('stat-packs').innerText = totalPacksGlobal;
        });
    </script>
</body>
</html>
