<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Match Pro - Dashboard Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .status-pill { padding: 2px 8px; border-radius: 99px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .table-header { padding: 1.5rem 1rem; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-7xl mx-auto space-y-8">
        <header class="flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-black italic uppercase">Back<span class="text-pink-500">Office</span></h1>
                <p class="text-gray-500 text-sm">Gestion des commandes et validité des licences</p>
            </div>
            <div class="text-right">
                <p id="clock" class="font-mono text-pink-500"></p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass p-6 rounded-3xl">
                <p class="text-gray-500 text-xs font-bold uppercase tracking-widest">Total CA</p>
                <p id="stat-ca" class="text-4xl font-black mt-2">0€</p>
            </div>
            <div class="glass p-6 rounded-3xl text-center">
                <p class="text-gray-500 text-xs font-bold uppercase tracking-widest">Commandes</p>
                <p id="stat-orders" class="text-4xl font-black mt-2 text-pink-500">0</p>
            </div>
            <div class="glass p-6 rounded-3xl text-right">
                <p class="text-gray-500 text-xs font-bold uppercase tracking-widest">Dernier Événement</p>
                <p id="stat-last" class="text-xl font-bold mt-2 truncate">--</p>
            </div>
        </div>

        <div class="glass rounded-[2rem] overflow-hidden overflow-x-auto">
            <table class="w-full text-left border-collapse min-w-[1000px]">
                <thead class="bg-white/5 text-gray-400 text-[10px] uppercase font-bold tracking-widest">
                    <tr>
                        <th class="table-header">Date Achat</th>
                        <th class="table-header">Événement / Client</th>
                        <th class="table-header">E-mail</th>
                        <th class="table-header">Début Event</th>
                        <th class="table-header">Fin Event</th>
                        <th class="table-header">Plan</th>
                        <th class="table-header text-right">Montant</th>
                        <th class="table-header text-center">Action</th>
                    </tr>
                </thead>
                <tbody id="orders-list" class="divide-y divide-white/5">
                    </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDP3JFut79NexJwawiDYEgJO0_r-HWYQVc",
            authDomain: "club-match-d2d39.firebaseapp.com",
            databaseURL: "https://club-match-d2d39-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "club-match-d2d39",
            storageBucket: "club-match-d2d39.firebasestorage.app",
            messagingSenderId: "975364560340",
            appId: "1:975364560340:web:64fd827ced5c24b808f241"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Mot de passe simple
        const pass = prompt("Accès Admin - Code :");
        if (pass !== "2026") {
            document.body.innerHTML = "<h1 class='text-white text-center mt-20 text-2xl font-black uppercase'>Accès Refusé</h1>";
        }

        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleString('fr-FR');
        }
        setInterval(updateClock, 1000);

        onValue(ref(db, 'orders'), async (snapshot) => {
            const list = document.getElementById('orders-list');
            list.innerHTML = "";
            let totalCA = 0;
            let count = 0;
            let lastEvent = "--";

            const data = snapshot.val();
            if (!data) return;

            const orders = Object.entries(data).reverse();

            for (const [key, order] of orders) {
                count++;
                totalCA += parseInt(order.totalAmount.replace('€', ''));
                lastEvent = order.eventName;

                // Récupération des dates réelles dans la config de l'event
                const configSnap = await get(ref(db, `events/${order.eventSlug}/config`));
                const config = configSnap.val() || {};
                
                const dateAchat = new Date(order.createdAt).toLocaleDateString('fr-FR');
                const dateDebut = config.startDate ? new Date(config.startDate).toLocaleDateString('fr-FR') : "N/A";
                const dateFin = config.expiryDate ? new Date(config.expiryDate).toLocaleDateString('fr-FR') : "N/A";
                
                const appLink = `${window.location.origin}/app.html?event=${order.eventSlug}`;

                const tr = document.createElement('tr');
                tr.className = "hover:bg-white/5 transition-colors";
                tr.innerHTML = `
                    <td class="p-4 text-xs text-gray-500 font-mono">${dateAchat}</td>
                    <td class="p-4">
                        <div class="font-bold text-white text-sm">${order.eventName}</div>
                        <div class="text-[10px] text-gray-500 uppercase">${order.clientName}</div>
                    </td>
                    <td class="p-4 text-xs">
                        <span class="bg-white/5 px-2 py-1 rounded text-pink-400 font-mono select-all border border-white/10">${order.email}</span>
                    </td>
                    <td class="p-4 text-sm font-bold text-green-400">${dateDebut}</td>
                    <td class="p-4 text-sm font-bold text-red-400">${dateFin}</td>
                    <td class="p-4">
                        <span class="status-pill ${order.plan === '48h' ? 'bg-blue-500/20 text-blue-400' : 'bg-purple-500/20 text-purple-400'}">
                            ${order.plan}
                        </span>
                    </td>
                    <td class="p-4 text-right font-black text-white">${order.totalAmount}</td>
                    <td class="p-4 text-center">
                        <a href="${appLink}" target="_blank" class="text-[9px] bg-white/10 hover:bg-pink-500 hover:text-white px-3 py-2 rounded-lg font-bold uppercase transition-all">Lien App</a>
                    </td>
                `;
                list.appendChild(tr);
            }

            document.getElementById('stat-ca').innerText = totalCA + "€";
            document.getElementById('stat-orders').innerText = count;
            document.getElementById('stat-last').innerText = lastEvent;
        });
    </script>
</body>
</html>
