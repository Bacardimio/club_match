<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Club Match Pro - App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --accent: #ff0055; }
        body { background: #0a0a0a; color: white; font-family: -apple-system, system-ui, sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-main { background: linear-gradient(135deg, var(--accent), #ff5e00); transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-main:active { transform: scale(0.95); }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.26, 1.36, 0.74, 1.2) forwards; }
        @keyframes pop { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
        
        #match-announcement {
            position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .msg { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 14px; margin-bottom: 8px; position: relative; }
        .msg-me { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; }
        .msg-them { align-self: flex-start; background: rgba(255,255,255,0.1); border-bottom-left-radius: 4px; }
    </style>
</head>
<body class="flex flex-col min-h-screen items-center p-4">

    <div id="match-announcement" onclick="this.style.display='none'">
        <h2 class="text-pink-500 text-2xl font-black italic uppercase tracking-tighter mb-2">Incroyable !</h2>
        <h1 class="text-7xl font-black italic uppercase text-white mb-4">MATCH 🔥</h1>
        <div class="glass p-10 rounded-[3rem] border-pink-500 shadow-[0_0_50px_rgba(255,0,85,0.3)]">
            <p class="text-gray-400 text-xs font-bold uppercase tracking-widest mb-2">Tu as flashé le badge</p>
            <span id="match-number-display" class="text-8xl font-black text-white">--</span>
        </div>
        <p class="mt-8 text-gray-500 font-bold animate-pulse">Appuie n'importe où pour continuer</p>
    </div>

    <div id="login-screen" class="hidden w-full max-w-sm my-auto space-y-10 animate-pop text-center">
        <h1 class="text-6xl font-black tracking-tighter italic uppercase text-white">CLUB<br><span class="text-pink-600">MATCH</span></h1>
        <div class="glass p-8 rounded-[2.5rem] space-y-5 shadow-2xl">
            <input type="number" id="user-badge" placeholder="N° BADGE" class="w-full bg-white/5 border-none rounded-2xl p-5 text-center text-3xl font-bold focus:ring-2 focus:ring-pink-500 outline-none text-white">
            <button id="btn-login-trigger" class="w-full btn-main py-5 rounded-2xl font-black text-xl uppercase tracking-widest text-white">Rejoindre</button>
            <p id="login-error" class="text-red-500 text-center text-xs font-bold hidden">Badge déjà utilisé.</p>
        </div>
    </div>

    <div id="main-app" class="hidden w-full max-w-md space-y-6">
        <header class="flex justify-between items-end py-4">
            <div>
                <p class="text-gray-500 text-[10px] uppercase font-bold tracking-widest">Connecté</p>
                <h2 class="text-3xl font-black text-white italic">Badge <span id="display-badge" class="text-pink-500">--</span></h2>
            </div>
            <button id="admin-trigger" class="opacity-20 hover:opacity-100 transition-opacity p-2 text-white text-2xl">⚙️</button>
        </header>

        <div class="grid grid-cols-3 gap-2">
            <div class="glass py-4 rounded-2xl text-center">
                <span class="block text-2xl font-black text-white" id="stat-likes-recus">0</span>
                <span class="text-[8px] uppercase text-gray-500 font-bold">Reçus</span>
            </div>
            <div class="glass py-4 rounded-2xl text-center border-pink-500/20">
                <span class="block text-2xl font-black text-pink-500" id="stat-matches">0</span>
                <span class="text-[8px] uppercase text-gray-500 font-bold">Matches 🔥</span>
            </div>
            <div class="glass py-4 rounded-2xl text-center">
                <span class="block text-2xl font-black text-white"><span id="stat-likes-envoyes">0</span><span class="text-gray-600 text-sm">/5</span></span>
                <span class="text-[8px] uppercase text-gray-500 font-bold">Envoyés</span>
            </div>
        </div>

        <div class="glass p-6 rounded-[2.5rem] shadow-2xl">
            <div class="flex space-x-3 items-center">
                <input type="number" id="target-badge" placeholder="N°" class="flex-1 bg-black/40 border border-white/10 rounded-2xl p-4 text-center text-4xl font-black focus:border-pink-500 outline-none text-white">
                <button id="btn-like-trigger" class="btn-main px-8 py-5 rounded-2xl font-black text-sm text-white uppercase tracking-widest">Flasher</button>
            </div>
            <p id="target-error" class="text-center text-red-500 text-[10px] font-bold uppercase hidden italic mt-3">Badge non trouvé !</p>
        </div>

        <div id="match-section" class="space-y-4">
            <div class="flex items-center space-x-2 px-2">
                <span class="text-[10px] font-black text-pink-500 uppercase tracking-widest italic">Tes Matches 🔥</span>
                <div class="h-px flex-1 bg-white/10"></div>
            </div>
            <div id="match-list" class="space-y-3"></div>
        </div>

        <div id="likes-sent-section" class="space-y-4 pb-20">
            <div class="flex items-center space-x-2 px-2">
                <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest italic">Historique des Flashs</span>
                <div class="h-px flex-1 bg-white/10"></div>
            </div>
            <div id="likes-sent-list" class="space-y-2"></div>
        </div>
    </div>

    <div id="chat-window" class="hidden fixed inset-0 bg-black z-40 flex flex-col">
        <header class="p-6 border-b border-white/10 flex items-center space-x-4">
            <button id="close-chat-trigger" class="text-2xl text-white">←</button>
            <h3 class="flex-1 text-xl font-black italic text-white">Chat #<span id="chat-target-badge">--</span></h3>
        </header>
        <div id="chat-messages" class="flex-1 overflow-y-auto p-6 flex flex-col"></div>
        <div class="p-6 bg-black border-t border-white/10 flex space-x-3">
            <input type="text" id="chat-input" placeholder="Message..." class="flex-1 bg-white/10 border-none rounded-2xl px-5 py-4 text-white">
            <button id="send-msg-trigger" class="btn-main px-6 rounded-2xl font-bold text-white">ENVOYER</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, get, remove, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDP3JFut79NexJwawiDYEgJO0_r-HWYQVc",
            authDomain: "club-match-d2d39.firebaseapp.com",
            databaseURL: "https://club-match-d2d39-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "club-match-d2d39",
            storageBucket: "club-match-d2d39.firebasestorage.app",
            messagingSenderId: "975364560340",
            appId: "1:975364560340:web:64fd827ced5c24b808f241"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const urlParams = new URLSearchParams(window.location.search);
        const eventID = urlParams.get('event') || 'default';
        const basePath = `events/${eventID}`;

        let currentBadge = localStorage.getItem(`myBadge_${eventID}`);
        let deviceId = localStorage.getItem(`deviceId_${eventID}`) || ('dev-' + Math.random().toString(36).substr(2, 9));
        localStorage.setItem(`deviceId_${eventID}`, deviceId);

        function showUI(id) {
            ['login-screen', 'main-app'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        // --- CORE LOGIC ---
        function updateAllLists(allLikes) {
            if (!currentBadge) return;
            const data = allLikes || {};
            
            // 1. Envoyés & Historique
            const myLikes = data[currentBadge] || {};
            const sentList = document.getElementById('likes-sent-list');
            sentList.innerHTML = "";
            
            Object.keys(myLikes).forEach(targetId => {
                const div = document.createElement('div');
                div.className = "glass p-3 rounded-xl flex justify-between items-center opacity-70";
                div.innerHTML = `
                    <span class="text-sm font-bold">Flashé #${targetId}</span>
                    <button onclick="deleteLike('${targetId}')" class="text-red-500 text-[10px] font-black uppercase">Annuler</button>
                `;
                sentList.appendChild(div);
            });
            document.getElementById('stat-likes-envoyes').innerText = Object.keys(myLikes).length;

            // 2. Reçus & Matches
            let receivedCount = 0;
            let matches = [];
            for (let user in data) {
                if (user !== currentBadge && data[user][currentBadge]) {
                    receivedCount++;
                    if (myLikes[user]) matches.push(user);
                }
            }
            document.getElementById('stat-likes-recus').innerText = receivedCount;
            document.getElementById('stat-matches').innerText = matches.length;

            // 3. Liste des Matches
            const matchList = document.getElementById('match-list');
            matchList.innerHTML = matches.length ? "" : "<p class='text-center text-gray-700 text-xs py-5 italic'>Aucun match pour le moment...</p>";
            matches.forEach(id => {
                const div = document.createElement('div');
                div.className = "glass p-4 rounded-2xl flex justify-between items-center border-l-4 border-pink-500 animate-pop";
                div.innerHTML = `<span class="font-black italic text-white">#${id}</span><button onclick="openChat('${id}')" class="btn-main px-4 py-2 rounded-xl text-xs font-bold uppercase">Chat</button>`;
                matchList.appendChild(div);
            });
        }

        // --- ACTIONS ---
        window.deleteLike = async (targetId) => {
            if(confirm(`Supprimer le flash vers #${targetId} ?`)) {
                await remove(ref(db, `${basePath}/likes/${currentBadge}/${targetId}`));
            }
        };

        document.getElementById('btn-like-trigger').onclick = async () => {
            const target = document.getElementById('target-badge').value.trim();
            const count = parseInt(document.getElementById('stat-likes-envoyes').innerText);
            if(!target || target === currentBadge) return;
            if(count >= 5) return alert("Limite de 5 flashs !");

            const snap = await get(ref(db, `${basePath}/users/${target}`));
            if(!snap.exists()) return document.getElementById('target-error').classList.remove('hidden');

            await set(ref(db, `${basePath}/likes/${currentBadge}/${target}`), true);
            const isMatch = await get(ref(db, `${basePath}/likes/${target}/${currentBadge}`));
            if(isMatch.exists()) {
                document.getElementById('match-number-display').innerText = "#" + target;
                document.getElementById('match-announcement').style.display = 'flex';
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            }
            document.getElementById('target-badge').value = "";
        };

        document.getElementById('btn-login-trigger').onclick = async () => {
            const badge = document.getElementById('user-badge').value.trim();
            if(!badge) return;
            const snap = await get(ref(db, `${basePath}/users/${badge}`));
            if (snap.exists() && snap.val() !== deviceId) {
                document.getElementById('login-error').classList.remove('hidden');
            } else {
                await set(ref(db, `${basePath}/users/${badge}`), deviceId);
                currentBadge = badge;
                localStorage.setItem(`myBadge_${eventID}`, badge);
                location.reload();
            }
        };

        // --- INIT ---
        if (currentBadge) {
            showUI('main-app');
            document.getElementById('display-badge').innerText = currentBadge;
            onValue(ref(db, `${basePath}/likes`), (snap) => updateAllLists(snap.val()));
        } else {
            showUI('login-screen');
        }

        // --- CHAT LOGIC ---
        window.openChat = (target) => {
            const activeRoom = [currentBadge, target].sort().join('-');
            document.getElementById('chat-target-badge').innerText = target;
            document.getElementById('chat-window').classList.remove('hidden');
            onValue(ref(db, `${basePath}/messages/${activeRoom}`), (snap) => {
                const container = document.getElementById('chat-messages');
                container.innerHTML = "";
                Object.values(snap.val() || {}).forEach(m => {
                    const d = document.createElement('div');
                    d.className = `msg ${m.sender === currentBadge ? 'msg-me' : 'msg-them'}`;
                    d.innerText = m.text;
                    container.appendChild(d);
                });
                container.scrollTop = container.scrollHeight;
            });
            document.getElementById('send-msg-trigger').onclick = async () => {
                const input = document.getElementById('chat-input');
                if(!input.value.trim()) return;
                await push(ref(db, `${basePath}/messages/${activeRoom}`), {
                    sender: currentBadge, text: input.value.trim(), time: serverTimestamp()
                });
                input.value = "";
            };
        };

        document.getElementById('close-chat-trigger').onclick = () => document.getElementById('chat-window').classList.add('hidden');
        document.getElementById('admin-trigger').onclick = () => {
             if (prompt("Code :") === "2026") {
                 if(confirm("Réinitialiser l'évènement ?")) remove(ref(db, basePath)).then(() => location.reload());
             }
        };
    </script>
</body>
</html>
