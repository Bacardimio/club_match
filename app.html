<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Club Match App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent: #ff0055; }
        body { background: #0a0a0a; color: white; font-family: -apple-system, system-ui, sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-main { background: linear-gradient(135deg, var(--accent), #ff5e00); transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-main:active { transform: scale(0.95); }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.26, 1.36, 0.74, 1.2) forwards; }
        @keyframes pop { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 14px; margin-bottom: 8px; position: relative; }
        .msg-me { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; }
        .msg-them { align-self: flex-start; background: rgba(255,255,255,0.1); border-bottom-left-radius: 4px; }
        .notification-dot { width: 10px; height: 10px; background-color: var(--accent); border-radius: 50%; box-shadow: 0 0 10px var(--accent); }
    </style>
</head>
<body class="flex flex-col min-h-screen items-center p-4">

    <!-- ECRANS DE STATUT -->
    <div id="closed-screen" class="hidden w-full max-w-sm my-auto text-center animate-pop">
        <h1 class="text-4xl font-black mb-4 uppercase italic">Club <span class="text-pink-600">Match</span></h1>
        <div class="glass p-8 rounded-[2.5rem]">
            <p id="closed-message" class="text-gray-400 font-bold uppercase tracking-widest text-sm">Vérification de l'événement...</p>
        </div>
    </div>

    <!-- CONNEXION -->
    <div id="login-screen" class="hidden w-full max-w-sm my-auto space-y-10 animate-pop text-center">
        <div>
            <h1 class="text-6xl font-black tracking-tighter italic uppercase text-white">CLUB<br><span class="text-pink-600">MATCH</span></h1>
            <p id="event-name-display" class="text-pink-500 mt-2 text-xs font-bold tracking-[0.2em] uppercase opacity-70">CHARGEMENT...</p>
        </div>
        <div class="glass p-8 rounded-[2.5rem] space-y-5 shadow-2xl">
            <input type="number" id="user-badge" placeholder="N° DE BADGE" class="w-full bg-white/5 border-none rounded-2xl p-6 text-center text-4xl font-bold focus:ring-2 focus:ring-pink-500 outline-none text-white transition-all">
            <button id="btn-login" class="w-full btn-main py-5 rounded-2xl font-black text-xl uppercase tracking-widest text-white">Rejoindre</button>
            <p id="login-error" class="text-red-500 text-center text-xs font-bold hidden">Badge déjà utilisé.</p>
        </div>
    </div>

    <!-- APP PRINCIPALE -->
    <div id="main-app" class="hidden w-full max-w-md space-y-6">
        <header class="flex justify-between items-end py-4">
            <div>
                <p class="text-gray-500 text-[10px] uppercase font-bold tracking-widest">Connecté</p>
                <h2 class="text-3xl font-black text-white italic">Badge <span id="display-badge" class="text-pink-500">--</span></h2>
            </div>
            <button id="btn-admin" class="opacity-20 hover:opacity-100 transition-opacity p-2 text-white text-2xl">⚙️</button>
        </header>

        <div class="grid grid-cols-3 gap-2">
            <div class="glass py-4 rounded-2xl text-center">
                <span class="block text-2xl font-black text-white" id="stat-likes-recus">0</span>
                <span class="text-[8px] uppercase text-gray-500 font-bold">Reçus</span>
            </div>
            <div class="glass py-4 rounded-2xl text-center">
                <span class="block text-2xl font-black text-pink-500" id="stat-matches">0</span>
                <span class="text-[8px] uppercase text-gray-500 font-bold">Matches 🔥</span>
            </div>
            <div class="glass py-4 rounded-2xl text-center">
                <span class="block text-2xl font-black text-white" id="stat-likes-envoyes">0</span>
                <span class="text-[8px] uppercase text-gray-500 font-bold">Envoyés</span>
            </div>
        </div>

        <div class="glass p-8 rounded-[2.5rem] space-y-5 shadow-2xl">
            <input type="number" id="target-badge" placeholder="N°" class="w-full bg-black/40 border border-white/10 rounded-3xl p-6 text-center text-6xl font-black focus:border-pink-500 outline-none text-white">
            <button id="btn-like" class="w-full btn-main py-6 rounded-2xl font-black text-xl text-white">FLASHER</button>
        </div>

        <div id="match-list" class="space-y-3"></div>
    </div>

    <!-- MODALE CHAT -->
    <div id="chat-window" class="hidden fixed inset-0 bg-black z-40 flex flex-col">
        <header class="p-6 border-b border-white/10 flex items-center space-x-4 bg-black/50 backdrop-blur-md">
            <button id="btn-close-chat" class="text-2xl text-white opacity-50">←</button>
            <h3 class="flex-1 text-xl font-black italic text-white">Chat #<span id="chat-target-badge">--</span></h3>
        </header>
        <div id="chat-messages" class="flex-1 overflow-y-auto p-6 flex flex-col"></div>
        <div class="p-6 bg-black border-t border-white/10 flex space-x-3">
            <input type="text" id="chat-input" placeholder="Message..." class="flex-1 bg-white/10 border-none rounded-2xl px-5 py-4 text-white outline-none">
            <button id="btn-send-msg" class="btn-main px-6 rounded-2xl font-bold text-white uppercase">Envoyer</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, get, remove, push, serverTimestamp, off } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDP3JFut79NexJwawiDYEgJO0_r-HWYQVc",
            authDomain: "club-match-d2d39.firebaseapp.com",
            databaseURL: "https://club-match-d2d39-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "club-match-d2d39",
            storageBucket: "club-match-d2d39.firebasestorage.app",
            messagingSenderId: "975364560340",
            appId: "1:975364560340:web:64fd827ced5c24b808f241"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const urlParams = new URLSearchParams(window.location.search);
        const eventID = urlParams.get('event') || 'default';
        const basePath = `events/${eventID}`;

        let currentBadge = localStorage.getItem(`myBadge_${eventID}`);
        let activeChatRoom = null;
        let deviceId = localStorage.getItem(`deviceId_${eventID}`) || ('dev-' + Math.random().toString(36).substr(2, 9));
        localStorage.setItem(`deviceId_${eventID}`, deviceId);

        function showUI(id) {
            ['closed-screen', 'login-screen', 'main-app'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        // INIT & CONFIG
        onValue(ref(db, `${basePath}/config`), (snap) => {
            const config = snap.val();
            if (config && config.active) {
                document.getElementById('event-name-display').innerText = config.eventName || eventID.toUpperCase();
                if (currentBadge) loadApp(); else showUI('login-screen');
            } else {
                showUI('closed-screen');
            }
        });

        // LOGIN
        document.getElementById('btn-login').onclick = async () => {
            const badge = document.getElementById('user-badge').value.trim();
            if(!badge) return;
            const userRef = ref(db, `${basePath}/users/${badge}`);
            const snapshot = await get(userRef);
            if (snapshot.exists() && snapshot.val() !== deviceId) {
                document.getElementById('login-error').classList.remove('hidden');
            } else {
                await set(userRef, deviceId);
                currentBadge = badge;
                localStorage.setItem(`myBadge_${eventID}`, badge);
                loadApp();
            }
        };

        // LIKE
        document.getElementById('btn-like').onclick = async () => {
            const target = document.getElementById('target-badge').value.trim();
            if(!target || target === currentBadge) return;
            await set(ref(db, `${basePath}/likes/${currentBadge}/${target}`), true);
            const check = await get(ref(db, `${basePath}/likes/${target}/${currentBadge}`));
            if(check.exists()) alert("MATCH ! 🔥");
            document.getElementById('target-badge').value = "";
        };

        // CHARGEMENT APP
        function loadApp() {
            showUI('main-app');
            document.getElementById('display-badge').innerText = currentBadge;
            onValue(ref(db, `${basePath}/likes`), (snapshot) => {
                const data = snapshot.val() || {};
                let matches = [];
                let likesRecus = 0;
                let myLikes = data[currentBadge] || {};

                for (let user in data) {
                    if (data[user][currentBadge]) {
                        likesRecus++;
                        if (myLikes[user]) matches.push(user);
                    }
                }

                document.getElementById('stat-likes-recus').innerText = likesRecus;
                document.getElementById('stat-likes-envoyes').innerText = Object.keys(myLikes).length;
                document.getElementById('stat-matches').innerText = matches.length;
                
                const list = document.getElementById('match-list');
                list.innerHTML = "";
                matches.forEach(id => {
                    const roomID = [currentBadge, id].sort().join('-');
                    const div = document.createElement('div');
                    div.className = "glass p-4 rounded-2xl flex justify-between items-center animate-pop border-l-4 border-pink-500";
                    div.innerHTML = `<div class="flex items-center space-x-3 cursor-pointer flex-1" id="trigger-${id}">
                        <div id="dot-${id}" class="hidden notification-dot animate-pulse"></div>
                        <span class="font-black italic text-white">Chat avec #${id}</span>
                    </div>`;
                    list.appendChild(div);
                    document.getElementById(`trigger-${id}`).onclick = () => openChat(id);

                    onValue(ref(db, `${basePath}/messages/${roomID}`), (mSnap) => {
                        const msgs = mSnap.val();
                        if (msgs && activeChatRoom !== roomID) {
                            const lastMsg = Object.values(msgs).pop();
                            const lastRead = localStorage.getItem(`read_${eventID}_${roomID}`) || 0;
                            if (lastMsg.sender !== currentBadge && lastMsg.time > lastRead) document.getElementById(`dot-${id}`).classList.remove('hidden');
                        }
                    });
                });
            });
        }

        // CHAT
        function openChat(target) {
            activeChatRoom = [currentBadge, target].sort().join('-');
            document.getElementById('chat-target-badge').innerText = target;
            document.getElementById('chat-window').classList.remove('hidden');
            const chatRef = ref(db, `${basePath}/messages/${activeChatRoom}`);
            onValue(chatRef, (snap) => {
                const container = document.getElementById('chat-messages');
                container.innerHTML = "";
                const data = snap.val();
                if (data) {
                    Object.values(data).forEach(m => {
                        const d = document.createElement('div');
                        d.className = `msg ${m.sender === currentBadge ? 'msg-me' : 'msg-them'}`;
                        d.innerText = m.text;
                        container.appendChild(d);
                    });
                    container.scrollTop = container.scrollHeight;
                    localStorage.setItem(`read_${eventID}_${activeChatRoom}`, Date.now());
                }
            });
        }

        document.getElementById('btn-close-chat').onclick = () => {
            if(activeChatRoom) off(ref(db, `${basePath}/messages/${activeChatRoom}`));
            document.getElementById('chat-window').classList.add('hidden');
            activeChatRoom = null;
        };

        document.getElementById('btn-send-msg').onclick = async () => {
            const input = document.getElementById('chat-input');
            if(!input.value.trim() || !activeChatRoom) return;
            await push(ref(db, `${basePath}/messages/${activeChatRoom}`), {
                sender: currentBadge,
                text: input.value.trim(),
                time: serverTimestamp()
            });
            input.value = "";
        };

        // ADMIN (CORRECTION ICI)
        document.getElementById('btn-admin').onclick = async () => {
            if (prompt("Code Admin :") === "2026") {
                if(confirm("⚠ Voulez-vous réinitialiser UNIQUEMENT cet événement ?")) {
                    // Cible uniquement le basePath de l'event
                    await remove(ref(db, basePath));
                    alert("Événement réinitialisé.");
                    location.reload();
                }
            }
        };
    </script>
</body>
</html>
