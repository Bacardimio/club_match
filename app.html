<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Club Match Pro - App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --accent: #ff0055; }
        body { 
            background: #0a0a0a; 
            color: white; \n            font-family: 'Inter', -apple-system, system-ui, sans-serif; 
            overflow-x: hidden; 
        }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-main { background: linear-gradient(135deg, var(--accent), #ff5e00); transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-main:active { transform: scale(0.95); }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.26, 1.36, 0.6, 0.94) forwards; }
        @keyframes pop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 99px; }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between max-w-md mx-auto relative px-4 pb-6">

    <div id="top-bar" class="hidden w-full pt-4 flex justify-between items-center z-50">
        <div class="flex items-center gap-2">
            <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
            <span id="badge-display" class="text-xs font-mono text-zinc-400">BADGE #--</span>
        </div>
        <button id="lang-switch" class="text-xs font-bold px-2.5 py-1 rounded bg-zinc-800 border border-zinc-700 text-zinc-300">EN</button>
    </div>

    <div id="login-screen" class="flex-1 flex flex-col justify-center items-center gap-8 my-auto animate-pop w-full">
        <div class="text-center">
            <h1 class="text-4xl font-black tracking-tighter bg-gradient-to-r from-white to-zinc-500 bg-clip-text text-transparent">CLUB MATCH PRO</h1>
            <p id="txt-subtitle" class="text-zinc-500 text-xs mt-1 uppercase tracking-widest">Digital Connection Hub</p>
        </div>

        <div class="glass w-full rounded-2xl p-6 flex flex-col gap-4">
            <div>
                <label id="lbl-badge" class="text-xs font-bold text-zinc-400 uppercase tracking-wider block mb-2">Votre Numéro de Badge</label>
                <input id="input-badge" type="number" pattern="[0-9]*" inputmode="numeric" placeholder="Ex: 42" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl py-3 px-4 text-center text-2xl font-black text-white focus:outline-none focus:border-red-500 transition-all">
            </div>
            <button id="btn-login-trigger" class="btn-main w-full py-4 rounded-xl font-bold text-sm tracking-wide shadow-lg shadow-red-500/10">ENTRER DANS L'ÉVÉNEMENT</button>
        </div>
    </div>

    <div id="main-app" class="hidden flex-1 flex flex-col justify-between w-full pt-4">
        
        <div class="flex gap-2 w-full mb-4">
            <button id="tab-flash" class="flex-1 py-3 text-center text-xs font-black tracking-wider uppercase border-b-2 border-red-500 text-white">FLASH</button>
            <button id="tab-chat" class="flex-1 py-3 text-center text-xs font-black tracking-wider uppercase border-b border-transparent text-zinc-500 relative">
                CHAT
                <div id="chat-dot" class="hidden absolute top-3 right-1/3 w-2 h-2 bg-red-500 rounded-full"></div>
            </button>
            <button id="tab-admin" class="hidden flex-1 py-3 text-center text-xs font-black tracking-wider uppercase border-b border-transparent text-zinc-500">ADMIN</button>
        </div>

        <div class="flex-1 flex flex-col justify-start">
            
            <div id="flash-window" class="flex flex-col gap-6 animate-pop">
                <div class="glass rounded-2xl p-6 text-center">
                    <h2 id="txt-match-title" class="text-xl font-black mb-1">Flashez un Profil</h2>
                    <p id="txt-match-desc" class="text-zinc-400 text-xs max-w-[250px] mx-auto">Entrez le numéro de badge de la personne que vous venez de rencontrer.</p>
                    
                    <input id="input-target" type="number" pattern="[0-9]*" inputmode="numeric" placeholder="--" class="w-32 bg-zinc-900 border border-zinc-800 rounded-xl py-3 text-center text-4xl font-black text-white mx-auto block mt-6 mb-4 focus:outline-none focus:border-red-500 transition-all">
                    
                    <button id="btn-like-trigger" class="btn-main px-8 py-3 rounded-xl font-bold text-xs tracking-wider uppercase shadow-lg shadow-red-500/10">Envoyer un Flash</button>
                </div>

                <div class="flex flex-col gap-3">
                    <h3 id="txt-my-matches" class="text-xs font-bold text-zinc-500 uppercase tracking-wider">Mes Matchs (<span id="match-count">0</span>)</h3>
                    <div id="matches-list" class="flex flex-col gap-2 max-h-[220px] overflow-y-auto pr-1">
                        </div>
                </div>
            </div>

            <div id="chat-window" class="hidden flex flex-col justify-between h-[calc(100vh-170px)] animate-pop">
                <div id="chat-messages" class="flex-1 overflow-y-auto space-y-3 pr-1 pb-4 flex flex-col">
                    </div>
                <div class="flex gap-2 items-center pt-2 border-t border-zinc-900 bg-[#0a0a0a]">
                    <input id="input-msg" type="text" placeholder="Votre message..." class="flex-1 bg-zinc-900 border border-zinc-800 rounded-xl py-3 px-4 text-sm focus:outline-none focus:border-red-500 text-white">
                    <button id="send-msg-trigger" class="btn-main p-3 rounded-xl">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
                    </button>
                </div>
            </div>

            <div id="admin-window" class="hidden flex flex-col gap-4 animate-pop max-h-[calc(100vh-170px)] overflow-y-auto pr-1">
                <div class="glass rounded-xl p-4 grid grid-cols-3 gap-2 text-center">
                    <div class="p-2 bg-zinc-900/50 rounded-lg"><div id="stat-users" class="text-lg font-black text-white">0</div><div class="text-[10px] text-zinc-500 uppercase font-bold">Actifs</div></div>
                    <div class="p-2 bg-zinc-900/50 rounded-lg"><div id="stat-likes" class="text-lg font-black text-white">0</div><div class="text-[10px] text-zinc-500 uppercase font-bold">Flashs</div></div>
                    <div class="p-2 bg-zinc-900/50 rounded-lg"><div id="stat-matches" class="text-lg font-black text-red-500">0</div><div class="text-[10px] text-zinc-500 uppercase font-bold">Matchs</div></div>
                </div>

                <div class="glass rounded-xl p-4 flex flex-col gap-3">
                    <h4 class="text-xs font-black text-zinc-400 uppercase">Forcer un Match</h4>
                    <div class="flex gap-2">
                        <input id="admin-m1" type="number" placeholder="B1" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-2 text-center text-sm">
                        <input id="admin-m2" type="number" placeholder="B2" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-2 text-center text-sm">
                        <button id="admin-match-trigger" class="bg-zinc-100 text-black px-4 rounded-lg text-xs font-bold uppercase">Créer</button>
                    </div>
                </div>

                <div class="glass rounded-xl p-4 flex flex-col gap-3">
                    <h4 class="text-xs font-black text-zinc-400 uppercase">Libérer un Badge</h4>
                    <div class="flex gap-2">
                        <input id="admin-delete-badge-input" type="number" placeholder="Badge #" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-2 text-center text-sm">
                        <button id="admin-delete-badge-trigger" class="bg-red-600 hover:bg-red-700 text-white px-4 rounded-lg text-xs font-bold uppercase">Libérer</button>
                    </div>
                </div>

                <button id="reset-event-trigger" class="w-full py-3 bg-red-950 border border-red-800 rounded-xl text-red-400 text-xs font-bold uppercase tracking-wider">Réinitialiser l'Événement</button>
            </div>

        </div>
    </div>

    <div id="footer-logo" class="w-full text-center pt-4 opacity-20 text-[10px] tracking-widest uppercase font-bold font-mono text-zinc-500">
        Powered by MatchPro v2.1
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, remove, push, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // CONFIGURATION FIREBASE SECURE
        const firebaseConfig = {
            databaseURL: "https://match-pro-78e71-default-rtdb.europe-west1.firebasedatabase.app/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const basePath = "event_prod"; // Espace isolé de production

        // SYSTEME DE TRADUCTION COMPLET INTEGRÉ
        const translations = {
            fr: {
                subtitle: "Digital Connection Hub",
                lblBadge: "Votre Numéro de Badge",
                btnLogin: "ENTRER DANS L'ÉVÉNEMENT",
                matchTitle: "Flashez un Profil",
                matchDesc: "Entrez le numéro de badge de la personne que vous venez de rencontrer.",
                btnLike: "Envoyer un Flash",
                myMatches: "Mes Matchs",
                placeholderMsg: "Votre message...",
                errorInvalidBadge: "Numéro de badge invalide (de 0 à 200).",
                alertLikeSelf: "Vous ne pouvez pas vous flasher vous-même.",
                alertAlreadyLiked: "Vous avez déjà flaché ce profil.",
                alertNewMatch: "FÉLICITATIONS ! C'est un MATCH avec le Badge #",
                alertSuccessLike: "Flash envoyé ! Si cette personne vous flashe aussi, vous serez connectés.",
                confirmClearAll: "ATTENTION ! Êtes-vous sûr de vouloir réinitialiser l'intégralité de l'événement ? Cette action supprime TOUT.",
                confirmDeleteLike: "Êtes-vous sûr de vouloir supprimer et libérer le badge",
                alertBadgeFreed: "Le badge _NUM_ a été entièrement supprimé et réinitialisé.",
                chatTab: "CHAT",
                flashTab: "FLASH",
                adminTab: "ADMIN"
            },
            en: {
                subtitle: "Digital Connection Hub",
                lblBadge: "Your Badge Number",
                btnLogin: "ENTER THE EVENT",
                matchTitle: "Flash a Profile",
                matchDesc: "Enter the badge number of the person you just met.",
                btnLike: "Send a Flash",
                myMatches: "My Matches",
                placeholderMsg: "Your message...",
                errorInvalidBadge: "Invalid badge number (from 0 to 200).",
                alertLikeSelf: "You cannot flash yourself.",
                alertAlreadyLiked: "You have already flashed this profile.",
                alertNewMatch: "CONGRATULATIONS! It's a MATCH with Badge #",
                alertSuccessLike: "Flash sent! If they flash you back, you will be connected.",
                confirmClearAll: "WARNING! Are you sure you want to completely reset the event? This deletes EVERYTHING.",
                confirmDeleteLike: "Are you sure you want to delete and free badge",
                alertBadgeFreed: "Badge _NUM_ has been fully deleted and reset.",
                chatTab: "CHAT",
                flashTab: "FLASH",
                adminTab: "ADMIN"
            }
        };

        window.currentLang = 'fr';

        function updateUIStrings() {
            const lang = window.currentLang;
            document.getElementById('txt-subtitle').innerText = translations[lang].subtitle;
            document.getElementById('lbl-badge').innerText = translations[lang].lblBadge;
            document.getElementById('btn-login-trigger').innerText = translations[lang].btnLogin;
            document.getElementById('txt-match-title').innerText = translations[lang].matchTitle;
            document.getElementById('txt-match-desc').innerText = translations[lang].matchDesc;
            document.getElementById('btn-like-trigger').innerText = translations[lang].btnLike;
            document.getElementById('txt-my-matches').innerHTML = `${translations[lang].myMatches} (<span id="match-count">0</span>)`;
            document.getElementById('input-msg').placeholder = translations[lang].placeholderMsg;
            document.getElementById('tab-chat').firstChild.textContent = translations[lang].chatTab + " ";
            document.getElementById('tab-flash').innerText = translations[lang].flashTab;
            document.getElementById('tab-admin').innerText = translations[lang].adminTab;
            document.getElementById('lang-switch').innerText = lang === 'fr' ? 'EN' : 'FR';
        }

        document.getElementById('lang-switch').onclick = () => {
            window.currentLang = window.currentLang === 'fr' ? 'en' : 'fr';
            updateUIStrings();
            if (window.currentUserBadge !== undefined) {
                renderMatches(window.allLikesData || {}, window.currentUserBadge);
            }
        };

        // GESTION DE L'ETAT DE L'APPLICATION
        let currentResetSignal = null;

        // Ecouter le signal de reset
        onValue(ref(db, `${basePath}/resetSignal`), (snapshot) => {
            const signal = snapshot.val();
            if (currentResetSignal === null) {
                currentResetSignal = signal;
            } else if (currentResetSignal !== signal) {
                localStorage.clear();
                location.reload();
            }
        });

        const savedBadge = localStorage.getItem('user_badge');
        if (savedBadge) {
            const badgeNum = parseInt(savedBadge, 10);
            // MODIFICATION ICI : Remplacement de <= 0 par < 0 pour autoriser le badge 0
            if (isNaN(badgeNum) || badgeNum > 200 || badgeNum < 0) {
                localStorage.clear();
            } else {
                initAppSession(badgeNum);
            }
        }

        updateUIStrings();

        // LOGIQUE DE CONNEXION
        document.getElementById('btn-login-trigger').onclick = async () => {
            const inputVal = document.getElementById('input-badge').value;
            const badgeNum = parseInt(inputVal, 10);

            // MODIFICATION ICI : Remplacement de <= 0 par < 0 pour autoriser le badge 0
            if (isNaN(badgeNum) || badgeNum > 200 || badgeNum < 0) {
                alert(translations[window.currentLang].errorInvalidBadge);
                return;
            }

            // Enregistrer l'utilisateur dans la base globale des actifs
            await set(ref(db, `${basePath}/users/${badgeNum}`), true);
            localStorage.setItem('user_badge', badgeNum);
            initAppSession(badgeNum);
        };

        // INITIALISATION SESSION UTILISATEUR Connecté
        function initAppSession(badgeNumber) {
            window.currentUserBadge = badgeNumber;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('top-bar').classList.remove('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('badge-display').innerText = `BADGE #${badgeNumber}`;

            if (badgeNumber === 999 || badgeNumber === 0) {
                document.getElementById('tab-admin').classList.remove('hidden');
            }

            setupNavigation();
            startDataSync(badgeNumber);
        }

        // NAVIGATION ONGLETS Simple
        function setupNavigation() {
            const tabs = {
                'tab-flash': 'flash-window',
                'tab-chat': 'chat-window',
                'tab-admin': 'admin-window'
            };

            Object.keys(tabs).forEach(tabId => {
                document.getElementById(tabId).onclick = () => {
                    Object.keys(tabs).forEach(t => {
                        document.getElementById(t).classList.remove('border-red-500', 'text-white');
                        document.getElementById(t).classList.add('border-transparent', 'text-zinc-500');
                        document.getElementById(tabs[t]).classList.add('hidden');
                    });
                    document.getElementById(tabId).classList.add('border-red-500', 'text-white');
                    document.getElementById(tabId).classList.remove('border-transparent', 'text-zinc-500');
                    document.getElementById(tabs[tabId]).classList.remove('hidden');

                    if (tabId === 'tab-chat') {
                        document.getElementById('chat-dot').classList.add('hidden');
                        const cm = document.getElementById('chat-messages');
                        cm.scrollTop = cm.scrollHeight;
                    }
                };
            });
        }

        // SYNCHRONISATION EN TEMPS RÉEL (Firebase Streams)
        function startDataSync(myBadge) {
            // Stream 1 : Tous les Flashs (Likes) pour calculer les Matchs en local
            onValue(ref(db, `${basePath}/likes`), (snapshot) => {
                const data = snapshot.val() || {};
                window.allLikesData = data;
                renderMatches(data, myBadge);
            });

            // Stream 2 : Fil Chat Global Direct
            let initialChatLoad = true;
            onValue(ref(db, `${basePath}/messages`), (snapshot) => {
                const messagesContainer = document.getElementById('chat-messages');
                messagesContainer.innerHTML = '';
                const data = snapshot.val() || {};
                
                Object.keys(data).forEach(msgId => {
                    const msg = data[msgId];
                    const isMe = msg.sender === myBadge;
                    
                    const bubble = document.createElement('div');
                    bubble.className = `flex flex-col max-w-[80%] ${isMe ? 'self-end items-end' : 'self-start items-start'}`;
                    
                    // Calcul du badge d'affichage ou du tag Admin
                    let tagDisplay = `Badge #${msg.sender}`;
                    if (msg.sender === 999 || msg.sender === 0) tagDisplay = `👑 ADMIN`;

                    bubble.innerHTML = `
                        <span class="text-[9px] font-bold text-zinc-500 mb-0.5 px-1">${tagDisplay}</span>
                        <div class="rounded-2xl px-4 py-2.5 text-sm ${isMe ? 'bg-gradient-to-br from-red-500 to-red-600 text-white rounded-tr-none' : 'bg-zinc-900 border border-zinc-800 text-zinc-100 rounded-tl-none'}">
                            ${escapeHTML(msg.text)}
                        </div>
                    `;
                    messagesContainer.appendChild(bubble);
                });

                if (document.getElementById('chat-window').classList.contains('hidden') && !initialChatLoad) {
                    document.getElementById('chat-dot').classList.remove('hidden');
                } else {
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                }
                initialChatLoad = false;
            });

            if (myBadge === 999 || myBadge === 0) {
                updateAdminStats();
            }
        }

        // ALGORITHME DE MATCH & AGGRÉGATION LOCAL
        function renderMatches(likesData, myBadge) {
            const listContainer = document.getElementById('matches-list');
            listContainer.innerHTML = '';

            const myLikes = likesData[myBadge] || {};
            let count = 0;

            Object.keys(myLikes).forEach(targetStr => {
                const target = parseInt(targetStr, 10);
                if (likesData[target] && likesData[target][myBadge]) {
                    count++;
                    const row = document.createElement('div');
                    row.className = "glass rounded-xl p-3 flex justify-between items-center border-l-4 border-l-red-500 animate-pop bg-gradient-to-r from-red-500/5 to-transparent";
                    row.innerHTML = `
                        <div class="flex items-center gap-3">
                            <div class="w-7 h-7 rounded-full bg-red-500/10 flex items-center justify-center text-red-500 font-black text-xs">M</div>
                            <div>
                                <div class="text-xs font-black text-white uppercase tracking-wide">MATCH COMPLÉTÉ</div>
                                <div class="text-[10px] font-mono text-zinc-400">Identifiant : Badge #${target}</div>
                            </div>
                        </div>
                    `;
                    listContainer.appendChild(row);
                }
            });

            document.getElementById('match-count').innerText = count;
        }

        // ACTION : ENVOYER UN FLASH (LIKE)
        document.getElementById('btn-like-trigger').onclick = async () => {
            const input = document.getElementById('input-target');
            const targetNum = parseInt(input.value, 10);
            const myBadge = window.currentUserBadge;

            // MODIFICATION ICI : Remplacement de <= 0 par < 0 pour autoriser le badge 0
            if (isNaN(targetNum) || targetNum > 200 || targetNum < 0) {
                alert(translations[window.currentLang].errorInvalidBadge);
                return;
            }

            if (targetNum === myBadge) {
                alert(translations[window.currentLang].alertLikeSelf);
                return;
            }

            // Vérifier si déjà liké
            if (window.allLikesData && window.allLikesData[myBadge] && window.allLikesData[myBadge][targetNum]) {
                alert(translations[window.currentLang].alertAlreadyLiked);
                return;
            }

            // Enregistrer le Like via transaction/set sécurisé
            await set(ref(db, `${basePath}/likes/${myBadge}/${targetNum}`), true);

            // Vérifier si réciproque immédiat (Déclenchement du Match)
            if (window.allLikesData && window.allLikesData[targetNum] && window.allLikesData[targetNum][myBadge]) {
                confetti({ particleCount: 120, spread: 70, origin: { y: 0.6 }, colors: ['#ff0055', '#ff5e00', '#ffffff'] });
                alert(`${translations[window.currentLang].alertNewMatch}${targetNum} ! 🎉`);
            } else {
                alert(translations[window.currentLang].alertSuccessLike);
            }

            input.value = '';
        };

        // ACTION : ENVOYER UN MESSAGE SUR LE CHAT GLOBAL
        document.getElementById('send-msg-trigger').onclick = async () => {
            const input = document.getElementById('input-msg');
            const text = input.value.trim();
            if (!text) return;

            const msgRef = push(ref(db, `${basePath}/messages`));
            await set(msgRef, {
                sender: window.currentUserBadge,
                text: text,
                timestamp: Date.now()
            });

            input.value = '';
        };

        // ZONE PANNEAU ADMIN (UNIQUEMENT FONCTIONNEL SI BADGE 999 OU 0)
        async function updateAdminStats() {
            const usersSnap = await get(ref(db, `${basePath}/users`));
            const likesSnap = await get(ref(db, `${basePath}/likes`));

            const totalUsers = usersSnap.exists() ? Object.keys(usersSnap.val()).length : 0;
            
            let totalLikes = 0;
            let totalMatches = 0;
            const likesData = likesSnap.val() || {};

            Object.keys(likesData).forEach(u1 => {
                Object.keys(likesData[u1]).forEach(u2 => {
                    totalLikes++;
                    if (likesData[u2] && likesData[u2][u1] && u1 < u2) {
                        totalMatches++;
                    }
                });
            });

            document.getElementById('stat-users').innerText = totalUsers;
            document.getElementById('stat-likes').innerText = totalLikes;
            document.getElementById('stat-matches').innerText = totalMatches;
        }

        document.getElementById('admin-match-trigger').onclick = async () => {
            const b1 = parseInt(document.getElementById('admin-m1').value, 10);
            const b2 = parseInt(document.getElementById('admin-m2').value, 10);

            if (isNaN(b1) || isNaN(b2)) return;

            await set(ref(db, `${basePath}/likes/${b1}/${b2}`), true);
            await set(ref(db, `${basePath}/likes/${b2}/${b1}`), true);

            alert(`Match forcé créé avec succès entre ${b1} et ${b2}.`);
            document.getElementById('admin-m1').value = "";
            document.getElementById('admin-m2').value = "";
            updateAdminStats();
        };

        document.getElementById('admin-delete-badge-trigger').onclick = async () => {
            const badge = parseInt(document.getElementById('admin-delete-badge-input').value, 10);
            if(!badge && badge !== 0) return;
            if (confirm(`${translations[window.currentLang]['confirmDeleteLike']} ${badge} ?`)) {
                await remove(ref(db, `${basePath}/users/${badge}`));
                await remove(ref(db, `${basePath}/likes/${badge}`));
                
                // Nettoyer aussi les likes reçus par ce badge chez les autres utilisateurs
                if (window.allLikesData) {
                    for (const dynamicBadge in window.allLikesData) {
                        if (window.allLikesData[dynamicBadge][badge]) {
                            await remove(ref(db, `${basePath}/likes/${dynamicBadge}/${badge}`));
                        }
                    }
                }

                alert(translations[window.currentLang]['alertBadgeFreed'].replace('_NUM_', badge));
                document.getElementById('admin-delete-badge-input').value = "";
                updateAdminStats();
            }
        };

        document.getElementById('reset-event-trigger').onclick = async () => {
            if (confirm(translations[window.currentLang]['confirmClearAll'])) {
                await remove(ref(db, `${basePath}/users`));
                await remove(ref(db, `${basePath}/likes`));
                await remove(ref(db, `${basePath}/messages`));
                await set(ref(db, `${basePath}/resetSignal`), Date.now()); 
                location.reload();
            }
        };

        // SECURITE CONTRE LES FAILLES XSS INJECTÉES DANS LE CHAT
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        // COMPORTEMENT CLAVIER TOUCHE ENTRÉE
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (!document.getElementById('chat-window').classList.contains('hidden')) document.getElementById('send-msg-trigger').click();
                else if (!document.getElementById('login-screen').classList.contains('hidden')) document.getElementById('btn-login-trigger').click();
                else if (!document.getElementById('main-app').classList.contains('hidden')) document.getElementById('btn-like-trigger').click();
            }
        });
    </script>
</body>
</html>
